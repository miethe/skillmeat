# Docker Compose configuration for SkillMeat Backstage/IDP Integration Demo
# Brings up a complete demo stack: SkillMeat API, Web UI, Backstage, and a
# PostgreSQL database seeded with sample financial-services data.
#
# PROFILES
#   full             -- All services (API, Web, Backstage stub, DB)
#   api-only         -- API server + DB only
#   backstage-only   -- Backstage stub only; uses an already-running API on
#                       the host (e.g. `skillmeat web dev`).  Set
#                       SKILLMEAT_API_URL to override the default of
#                       http://host.containers.internal:8080
#
# QUICK START
#   Full stack:
#     podman-compose -f docker-compose.demo.yml --profile full up
#
#   API + DB only:
#     podman-compose -f docker-compose.demo.yml --profile api-only up
#
#   Backstage only (demo/backstage-app must be set up first — see demo/README.md):
#     podman-compose -f docker-compose.demo.yml --profile backstage-only up
#
#   Backstage only against a remote API:
#     SKILLMEAT_API_URL=http://1.2.3.4:8080 \
#       podman-compose -f docker-compose.demo.yml --profile backstage-only up
#
#   Tear down (preserve data volume):
#     docker compose -f docker-compose.demo.yml down
#
#   Tear down + wipe DB:
#     docker compose -f docker-compose.demo.yml down -v

version: '3.8'

services:
  # ===================================================================
  # DEMO-DB -- PostgreSQL seeded with sample fin-serv data
  # Used by SkillMeat API and Backstage for the IDP catalog demo.
  # ===================================================================
  demo-db:
    image: postgres:16-alpine
    profiles:
      - full
      - api-only
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=demo
      - POSTGRES_PASSWORD=demo_password
      - POSTGRES_DB=demo_finserv
    volumes:
      # Persistent named volume -- survives container restarts
      - demo-db-data:/var/lib/postgresql/data
      # Init script runs once on first startup (when data volume is empty)
      - ./demo/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo_finserv"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - demo

  # ===================================================================
  # SKILLMEAT-API -- SkillMeat API Server
  # Runs uvicorn directly using the official Python image so no
  # Dockerfile is required for the demo.  Swap image + command for a
  # pre-built image once CI publishes one.
  # ===================================================================
  skillmeat-api:
    image: python:3.12-slim
    profiles:
      - full
      - api-only
    working_dir: /app
    # Mount the repo into the container and install in editable mode so the
    # demo always runs the local checkout without a build step.
    command: >
      bash -c "
        pip install -q -e '.[dev]' &&
        uvicorn skillmeat.api.main:app
          --host 0.0.0.0
          --port 8080
          --log-level info
      "
    ports:
      - "8080:8080"
    environment:
      - SKILLMEAT_ENV=demo
      - SKILLMEAT_HOST=0.0.0.0
      - SKILLMEAT_PORT=8080
      - SKILLMEAT_LOG_LEVEL=INFO
      - SKILLMEAT_LOG_FORMAT=text

      # Feature flags -- keep demo lightweight
      - SKILLMEAT_MEMORY_CONTEXT_ENABLED=true
      - SKILLMEAT_MEMORY_AUTO_EXTRACT=false
      - SKILLMEAT_ENABLE_AUTO_DISCOVERY=true
      - SKILLMEAT_ENABLE_AUTO_POPULATION=true

      # Security -- relaxed for demo (no API key required)
      - SKILLMEAT_API_KEY_ENABLED=false
      - SKILLMEAT_AUTH_ENABLED=false
      - SKILLMEAT_RATE_LIMIT_ENABLED=false

      # CORS -- allow all origins in demo mode
      - SKILLMEAT_CORS_ORIGINS=["*"]

      # DB connection for demo data (used by IDP scaffold actions)
      - DEMO_DB_URL=postgresql://demo:demo_password@demo-db:5432/demo_finserv

      # Optional: inject a GitHub token for live artifact fetching
      - SKILLMEAT_GITHUB_TOKEN=${SKILLMEAT_GITHUB_TOKEN:-}
    volumes:
      # Mount the full repo for editable install
      - .:/app:ro
      # Mount user's local collection so demo can show real artifacts.
      # Falls back to empty dir if ~/.skillmeat doesn't exist yet.
      - ${SKILLMEAT_COLLECTION_PATH:-~/.skillmeat}:/root/.skillmeat
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      - demo-db
    networks:
      - demo

  # ===================================================================
  # SKILLMEAT-WEB -- Next.js Web UI
  # Runs `pnpm dev` from the web directory for hot-reload during demos.
  # For a faster startup swap `pnpm dev` -> `pnpm build && pnpm start`.
  # ===================================================================
  skillmeat-web:
    image: node:20-slim
    profiles:
      - full
    working_dir: /app/skillmeat/web
    command: >
      bash -c "
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm dev
      "
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # Point at the API container (inter-service DNS on the demo network)
      - NEXT_PUBLIC_API_URL=http://skillmeat-api:8080/api/v1
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      # Mount repo so the dev server picks up local changes
      - .:/app:ro
      # Isolate node_modules inside the container to avoid host conflicts
      - skillmeat-web-node-modules:/app/skillmeat/web/node_modules
      - skillmeat-web-next-cache:/app/skillmeat/web/.next
    depends_on:
      - skillmeat-api
    networks:
      - demo

  # ===================================================================
  # BACKSTAGE -- Backstage IDP Instance
  #
  # Built from demo/dockerfile (Backstage production image spec).
  # The Backstage app lives at demo/backstage-app/ inside this repo.
  #
  # ONE-TIME SETUP (run from repo root):
  #   cd demo
  #   npx @backstage/create-app@latest
  #   # when prompted for name, use: backstage-app
  #   cd backstage-app
  #   yarn workspace backend add @skillmeat/backstage-plugin-scaffolder-backend
  #   # wire plugin into packages/backend/src/index.ts — see demo/README.md
  #   cp ../backstage-app-config.yaml app-config.local.yaml
  #   ln -s ../dockerfile Dockerfile   # symlink so compose can find it
  #   yarn build:backend
  #
  # Start (from repo root):
  #   podman-compose -f docker-compose.demo.yml --profile backstage-only up
  #
  # Rebuild after plugin changes:
  #   cd demo/backstage-app && yarn build:backend
  #   podman-compose -f docker-compose.demo.yml build backstage
  #
  # NOTE: --mount=type=cache requires BuildKit.
  #   With podman: BUILDAH_FORMAT=docker podman-compose build backstage
  # ===================================================================
  backstage:
    build:
      # Defaults to demo/backstage-app/ inside this repo — no env var needed
      # for the standard setup.  Override only if your app lives elsewhere.
      context: ${BACKSTAGE_APP_DIR:-./demo/backstage-app}
      dockerfile: Dockerfile   # symlink → ../dockerfile (demo/dockerfile)
    profiles:
      - full
      # backstage-only: start only Backstage, pointing at an already-running
      # SkillMeat API (e.g. `skillmeat web dev`) on the host.
      - backstage-only
    ports:
      - "7007:7007"
    environment:
      # SkillMeat API endpoint consumed by the scaffolder plugin actions.
      #
      # full profile:          http://skillmeat-api:8080  (in-compose service)
      # backstage-only profile: host.containers.internal:8080 (host, podman)
      #                          host.docker.internal:8080     (host, Docker)
      #
      # Override at runtime:
      #   SKILLMEAT_API_URL=http://1.2.3.4:8080 podman-compose ... up
      - SKILLMEAT_API_URL=${SKILLMEAT_API_URL:-http://host.containers.internal:8080}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - APP_CONFIG_app_backend_baseUrl=http://localhost:7007
      - APP_CONFIG_app_baseUrl=http://localhost:3000
    # depends_on is intentionally absent: in backstage-only mode there is no
    # in-compose API service to wait for.
    networks:
      - demo

# ===================================================================
# VOLUMES (Persistent Storage)
# ===================================================================
volumes:
  # PostgreSQL data -- persists across `docker compose down` restarts
  demo-db-data:
    driver: local

  # Next.js development caches -- speeds up rebuilds inside the container
  skillmeat-web-node-modules:
    driver: local
  skillmeat-web-next-cache:
    driver: local

# ===================================================================
# NETWORKS
# ===================================================================
networks:
  demo:
    driver: bridge
    # Subnet chosen to avoid conflicts with common local dev ranges
    ipam:
      config:
        - subnet: 172.30.0.0/16

# ===================================================================
# USAGE REFERENCE
# ===================================================================
# Full stack (API + Web + Backstage stub + DB):
#   docker compose -f docker-compose.demo.yml --profile full up
#
# API + DB only (faster for backend demos):
#   docker compose -f docker-compose.demo.yml --profile api-only up
#
# View logs for a single service:
#   docker compose -f docker-compose.demo.yml logs -f skillmeat-api
#
# Exec into Backstage stub to run Backstage manually:
#   docker compose -f docker-compose.demo.yml exec backstage bash
#
# Stop all services (data volume preserved):
#   docker compose -f docker-compose.demo.yml down
#
# Stop and wipe DB data:
#   docker compose -f docker-compose.demo.yml down -v
#
# Override collection path (default: ~/.skillmeat):
#   SKILLMEAT_COLLECTION_PATH=/path/to/collection \
#     docker compose -f docker-compose.demo.yml --profile full up
