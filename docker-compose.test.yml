services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: skillmeat_test
      POSTGRES_PASSWORD: skillmeat_test
      POSTGRES_DB: skillmeat_test
    ports:
      - "5433:5432"  # Use 5433 to avoid conflicts with a local PostgreSQL instance
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillmeat_test -d skillmeat_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql/data  # In-memory storage for CI speed and statelesness
